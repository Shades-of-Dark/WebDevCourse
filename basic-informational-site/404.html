<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 420px;
      padding: 30px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 15px;
      font-size: 4rem;
      letter-spacing: -2px;
    }
    p {
      margin: 0 0 20px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      color: #fff;
      background: #007acc;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
    }
    a:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Page not found. The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/">Return to homepage</a>
  </div>
</body>
</html>
