<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ODIN</title>
</head>

<body>

    <div class="main-layout">


        <div class="image-side">
            <div class="branding">
                <img src="odin-lined.png" alt="Logo" class="brand-logo">
                ODIN
            </div>
            <div class="attribution">
                Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a> on <a
                    href="https://unsplash.com/" target="_blank">Unsplash</a>
            </div>
        </div>


        <div class="text-side">


            <div class="intro-section">
                <p>This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.<br>
                    Sign up <em>now</em> to get started. <br><br>
                    You <em>know</em> you want to.</p>
            </div>


            <div class="form-container">
                <p class="cta">Let's do this!</p>

                <form action="" method="post">
                    <div class="field-group">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" id="first_name" name="first_name" required value="Thor">
                    </div>

                    <div class="field-group">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" id="last_name" name="last_name" required value="Odinson">
                    </div>

                    <div class="field-group">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="field-group">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="field-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" required class="error-trigger">
                    </div>

                    <div class="field-group">
                        <label for="conf_pass">CONFIRM PASSWORD</label>
                        <input type="password" id="conf_pass" name="conf_pass" required class="error-trigger">
                    </div>
                </form>
            </div>


            <div class="action-section">
                <button type="submit" class="submit-btn">Create Account</button>
                <p class="login-prompt">Already have an account? <a href="#">Log in</a></p>
            </div>

        </div>

    </div>

</body>

</html>
